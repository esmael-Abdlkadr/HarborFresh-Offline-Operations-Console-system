services:

  # ── Production app (Nginx static serve) ──────────────────────────────────────
  harborfresh:
    build:
      context: .
      dockerfile: Dockerfile
      target: server
    ports:
      - "8120:80"
    restart: unless-stopped

  # ── Unit tests + TypeScript check + Lint ─────────────────────────────────────
  test:
    build:
      context: .
      dockerfile: Dockerfile
      target: test-runner
    environment:
      # Ensure deterministic seeded users in validator containers.
      VITE_TEST_SEED: "true"
    profiles:
      - test

  # ── Playwright E2E (runs against the harborfresh service) ────────────────────
  e2e:
    image: mcr.microsoft.com/playwright:v1.59.0-noble
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
      # Reuse npm cache between runs to reduce install time.
      - npm_cache:/root/.npm
    command: sh -c "npm ci --prefer-offline --no-audit --no-fund && npx playwright test --project=chromium"
    profiles:
      - test

volumes:
  npm_cache:
